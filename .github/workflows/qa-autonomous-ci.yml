name: QA Autonomous System — CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      test_groups:
        description: 'TestNG groups to run (e.g. smoke, sample-api, system)'
        required: false
        default: 'smoke'
      ollama_model:
        description: 'Ollama model to use'
        required: false
        default: 'llama3'

env:
  JAVA_VERSION: '17'
  OLLAMA_BASE_URL: 'http://localhost:11434'
  OLLAMA_MODEL: ${{ github.event.inputs.ollama_model || 'llama3' }}

jobs:

  # ============================================================
  # JOB 1: Build and unit test (no Ollama needed)
  # ============================================================
  build-and-validate:
    name: Build & Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Validate Maven POM
        run: mvn validate --no-transfer-progress

      - name: Compile sources
        run: mvn compile --no-transfer-progress

      - name: Compile tests
        run: mvn test-compile --no-transfer-progress

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

  # ============================================================
  # JOB 2: Smoke tests with Ollama (self-hosted or service)
  # ============================================================
  smoke-tests:
    name: Smoke Tests (Ollama + Llama3)
    runs-on: ubuntu-latest
    needs: build-and-validate

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          echo "Ollama installed successfully"

      - name: Start Ollama service
        run: |
          ollama serve &
          echo "Waiting for Ollama to start..."
          sleep 5
          curl -f http://localhost:11434/api/tags || (echo "Ollama not ready" && exit 1)
          echo "Ollama is ready"

      - name: Pull Llama3 model
        run: |
          echo "Pulling llama3 model (this may take several minutes on first run)..."
          ollama pull ${{ env.OLLAMA_MODEL }}
          echo "Model ready"

      - name: Install Playwright browsers
        run: mvn exec:java -e -D exec.mainClass=com.microsoft.playwright.CLI -D exec.args="install chromium" --no-transfer-progress || true

      - name: Run smoke tests
        run: |
          mvn test \
            -Dgroups=smoke \
            -Dollama.base.url=${{ env.OLLAMA_BASE_URL }} \
            -Dollama.model=${{ env.OLLAMA_MODEL }} \
            --no-transfer-progress
        env:
          OLLAMA_BASE_URL: ${{ env.OLLAMA_BASE_URL }}
          OLLAMA_MODEL: ${{ env.OLLAMA_MODEL }}

      - name: Generate Allure report
        if: always()
        run: mvn allure:report --no-transfer-progress || true

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-smoke
          path: target/allure-results
          retention-days: 30

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-smoke
          path: target/allure-report
          retention-days: 30

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: logs/
          retention-days: 7

  # ============================================================
  # JOB 3: API sample prompts (fast subset)
  # ============================================================
  sample-api-prompts:
    name: Sample API Prompts
    runs-on: ubuntu-latest
    needs: smoke-tests
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Install and start Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve &
          sleep 5
          ollama pull ${{ env.OLLAMA_MODEL }}

      - name: Run API sample prompts
        run: |
          mvn test \
            -Dgroups=sample-api \
            -Dollama.base.url=${{ env.OLLAMA_BASE_URL }} \
            -Dollama.model=${{ env.OLLAMA_MODEL }} \
            --no-transfer-progress

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-sample-api
          path: target/allure-results
          retention-days: 14

  # ============================================================
  # JOB 4: Publish Allure report to GitHub Pages (main only)
  # ============================================================
  publish-report:
    name: Publish Allure Report
    runs-on: ubuntu-latest
    needs: [ smoke-tests ]
    if: github.ref == 'refs/heads/main' && always()
    permissions:
      contents: write
      pages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results-smoke
          path: target/allure-results

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Generate Allure report
        run: mvn allure:report --no-transfer-progress || true

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: success()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: target/allure-report
          destination_dir: allure-report
