# ============================================================
# QA Autonomous System - Configuration
# ============================================================

# Ollama Configuration
ollama.base.url=http://localhost:11434
ollama.model=llama3   
ollama.timeout.seconds=120
ollama.max.tokens=4096
ollama.temperature=0.1
ollama.top.p=0.9
ollama.stream=false

# Agent Orchestration
orchestrator.max.retries=3
orchestrator.retry.delay.ms=3000
orchestrator.agent.timeout.seconds=180
orchestrator.parallel.agents=false

# Playwright
playwright.browser=chromium
playwright.headless=true
playwright.slow.mo=0
playwright.timeout.ms=30000
playwright.base.url=http://localhost:3000

# REST Assured
restassured.base.uri=http://localhost:8080
restassured.connection.timeout=30000
restassured.socket.timeout=60000

# Allure
allure.results.directory=target/allure-results
allure.report.directory=target/allure-report

# Logging
log.agent.prompts=true
log.agent.responses=true
log.token.usage=true

# Code Generation
codegen.output.dir=src/test/java/com/qa/autonomous/generated
codegen.template.dir=src/main/resources/templates
